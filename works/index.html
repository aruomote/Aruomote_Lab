<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works — Aruomote Lab</title>
  <meta name="description" content="AI生成画像、キャラクター、ゲームなどの制作物一覧。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <main>
    <div class="page-header">
      <h1 class="page-title">Works</h1>
      <p class="page-desc">AI生成画像、キャラクター、ゲームなどの制作物を一覧します。</p>
    </div>

    <section class="section">
      <!-- Category Filter -->
      <div class="filter-bar" id="works-filter">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="images"><i class="fa-solid fa-image"></i> Images</button>
        <button class="filter-btn" data-filter="characters"><i class="fa-solid fa-user"></i> Characters</button>
        <button class="filter-btn" data-filter="games"><i class="fa-solid fa-gamepad"></i> Games</button>
        <button class="filter-btn" data-filter="experiments"><i class="fa-solid fa-flask"></i> Experiments</button>
      </div>

      <!-- Works Grid -->
      <div class="card-grid cols-3" id="works-grid">
        <a class="content-card" href="ai-katame-illust.html" data-category="images">
          <div class="thumb"><img src="/assets/illust01_key.webp" alt="AIで女の子を固めてみた!"
              style="width:100%; height:100%; object-fit:cover; display:block;"></div>
          <div class="info">
            <h4>AIで女の子を固めてみた!</h4>
            <p>ローカル生成での良作を集めたAI固めイラスト集</p>
            <span class="tag"><i class="fa-solid fa-image"></i> Images</span>
          </div>
        </a>

        <a class="content-card" href="ai-chat.html" data-category="characters">
          <div class="thumb"><img src="/assets/aichat_key.png" alt="河東麻衣子"
              style="width:100%; height:100%; object-fit:cover; display:block;"></div>
          <div class="info">
            <h4>河東麻衣子</h4>
            <p>Poeで動作する石化に憧れるAI少女のチャットボット</p>
            <span class="tag"><i class="fa-solid fa-user"></i> Characters</span>
          </div>
        </a>

        <a class="content-card" href="kachikochi.html" data-category="games">
          <div class="thumb"><img src="/assets/kachikochi_key.jpg" alt="カチコチなのは私のせい！？"
              style="width:100%; height:100%; object-fit:cover; display:block;"></div>
          <div class="info">
            <h4>カチコチなのは私のせい！？</h4>
            <p>AIで一から作成した百合っぽい固めノベルゲーム</p>
            <span class="tag"><i class="fa-solid fa-gamepad"></i> Games</span>
          </div>
        </a>
        <a class="content-card" href="ulysses.html" data-category="games">
          <div class="thumb"><img src="/assets/ulysses_key.webp" alt="ユリシーズ"
              style="width:100%; height:100%; object-fit:cover; display:block;"></div>
          <div class="info">
            <h4>ユリシーズ</h4>
            <p>ティラノスクリプトで作成した固められノベルゲーム</p>
            <span class="tag"><i class="fa-solid fa-gamepad"></i> Games</span>
          </div>
        </a>
        <a class="content-card" href="stone-bride.html" data-category="games">
          <div class="thumb"><img src="/assets/stonebride_key.webp" alt="石の花嫁"
              style="width:100%; height:100%; object-fit:cover; display:block;"></div>
          <div class="info">
            <h4>石の花嫁</h4>
            <p>AIをGMにしたブラウザTRPGゲーム</p>
            <span class="tag"><i class="fa-solid fa-gamepad"></i> Games</span>
          </div>
        </a>
      </div>
    </section>
  </main>

  <script type="module">
    import { renderHeader, renderFooter, initFilter } from '/main.js';
    renderHeader('Works');
    renderFooter();
    initFilter('#works-filter', '#works-grid .content-card');
  </script>
</body>

</html>
