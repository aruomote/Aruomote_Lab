<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIで女の子を固めてみた! — Aruomote Lab</title>
  <meta name="description" content="イラスト集「AIで女の子を固めてみた!」の紹介。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
  <style>
    .game-hero {
      position: relative;
      width: 100%;
      height: 400px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, rgba(60, 160, 170, 0.4) 0%, rgba(20, 40, 50, 0.9) 100%), url('/assets/illust01_key.webp') center/cover;
      display: flex;
      align-items: flex-end;
      padding: 2rem;
      border: 1px solid var(--border);
    }

    .game-hero-content {
      position: relative;
      z-index: 2;
    }

    .game-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: #cccccc;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .game-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .meta-box {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .meta-box h4 {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .meta-box p {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
    }

    .screenshot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .screenshot {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      aspect-ratio: 16/9;
      background-color: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      overflow: hidden;
    }

    .screenshot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      justify-content: center;
    }

    .btn {
      padding: 0.8rem 2rem;
      border-radius: 30px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: #3ca0aa;
      color: white;
    }

    .btn-primary:hover {
      background: #4cb0ba;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <main>
    <article class="section" style="max-width: 900px; margin: 0 auto;">

      <!-- Breadcrumb -->
      <nav style="margin-bottom: 1.5rem; font-size: 0.9rem;">
        <a href="../" style="color: var(--text-secondary);"><i class="fa-solid fa-house"></i> Home</a>
        <span style="margin: 0 0.5rem; color: var(--border);">/</span>
        <a href="../works/" style="color: var(--text-secondary);">Works</a>
        <span style="margin: 0 0.5rem; color: var(--border);">/</span>
        <span>AIで女の子を固めてみた!</span>
      </nav>

      <!-- Hero Section -->
      <div class="game-hero">
        <div class="game-hero-content">
          <span class="tag"
            style="background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1);"><i
              class="fa-solid fa-image"></i> Illustration</span>
          <h1 class="game-title">AIで女の子を固めてみた!</h1>
        </div>
      </div>

      <!-- Quick Info -->
      <div class="game-meta">
        <div class="meta-box">
          <h4><i class="fa-solid fa-layer-group"></i> Genre</h4>
          <p>イラスト集</p>
        </div>
        <div class="meta-box">
          <h4><i class="fa-solid fa-globe"></i> Platform</h4>
          <p>DLsite</p>
        </div>
        <div class="meta-box">
          <h4><i class="fa-solid fa-calendar"></i> Status</h4>
          <p>Released <span style="font-size:0.85em; color:var(--text-secondary); font-weight:normal;">(2024年7月)</span>
          </p>
        </div>
      </div>

      <!-- Overview -->
      <div class="article-content">
        <h2>About the Work</h2>
        <p>
          「AIで女の子を固めてみた!」は、SDXLをベースにした画像生成モデルや各種固めLoraを使用し、様々な固めに挑戦した成果をまとめたAI生成イラスト集です。今振り返ってもどうやって生成したのか良くわからないほどクオリティの高い画像がいくつもあって驚きます。
        </p>

        <!-- Screenshots / Sample Images -->
        <h2>Samples</h2>
        <div class="screenshot-grid">
          <div class="screenshot">
            <img src="/assets/illust01_ss01.webp" alt="Sample 1">
          </div>
          <div class="screenshot">
            <img src="/assets/illust01_ss02.webp" alt="Sample 2">
          </div>
        </div>

        <div class="action-buttons">
          <a href="https://www.dlsite.com/aix/work/=/product_id/RJ01221090.html" target="_blank"
            rel="noopener noreferrer" class="btn btn-primary"><i class="fa-solid fa-store"></i> DLsiteで詳細を見る</a>
        </div>
      </div>

    </article>
  </main>

  <script type="module">
    import { renderHeader, renderFooter } from '../main.js';
    renderHeader('Works');
    renderFooter();
  </script>
</body>

</html>
